<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CampusHome">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    <title>Étudiants inscrits - CampusHome</title>

    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--light);
            background-image: var(--bg-mesh);
            min-height: 100vh;
            color: var(--dark);
        }

        .header-premium {
            background: var(--white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .container-premium {
            width: 95%;
            max-width: 900px;
            margin: 3rem auto;
            background: var(--white);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #students-list li {
            background: var(--light);
            margin-bottom: 1rem;
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] #students-list li {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        #students-list li:hover {
            transform: translateX(10px);
            box-shadow: var(--shadow-sm);
            border-color: var(--primary);
        }

        .btn-action-sm {
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            border: none;
            font-size: 0.85rem;
        }

        .btn-pay {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        .btn-config {
            background: var(--light);
            color: var(--dark);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .btn-config {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .btn-del {
            background: #fff1f2;
            color: #e11d48;
        }

        [data-theme="dark"] .btn-del {
            background: rgba(225, 29, 72, 0.1);
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3);
        }

        @media (max-width: 768px) {
            .header-premium {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .container-premium {
                width: 98%;
                padding: 1.5rem;
                margin: 1.5rem auto;
                border-radius: 20px;
            }

            #students-list li {
                flex-direction: column !important;
                gap: 1.5rem;
                padding: 1.2rem;
                align-items: flex-start !important;
            }

            .btn-action-sm {
                width: 100%;
                justify-content: center;
                height: 48px;
                font-size: 1rem;
            }

            /* Table to Cards Transformation */
            .table-responsive table,
            .table-responsive thead,
            .table-responsive tbody,
            .table-responsive th,
            .table-responsive td,
            .table-responsive tr {
                display: block;
            }

            .table-responsive thead tr {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            .table-responsive tr {
                border: 1px solid #eee;
                margin-bottom: 1.5rem;
                padding: 1rem;
                border-radius: 15px;
                background: var(--white);
                box-shadow: var(--shadow-sm);
            }

            .table-responsive td {
                border: none;
                border-bottom: 1px solid #f1f5f9;
                position: relative;
                padding-left: 50%;
                text-align: right;
                padding-top: 0.8rem;
                padding-bottom: 0.8rem;
            }

            .table-responsive td:last-child {
                border-bottom: none;
            }

            .table-responsive td:before {
                position: absolute;
                top: 0.8rem;
                left: 0.5rem;
                width: 45%;
                padding-right: 10px;
                white-space: nowrap;
                text-align: left;
                font-weight: 800;
                color: var(--primary);
            }

            .table-responsive td:nth-of-type(1):before {
                content: "Étudiant";
            }

            .table-responsive td:nth-of-type(2):before {
                content: "Logement";
            }

            .table-responsive td:nth-of-type(3):before {
                content: "Paiement";
            }

            .table-responsive td:nth-of-type(4):before {
                content: "Actions";
            }
        }
    </style>
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
</head>

<body class="fade-in">

    <header class="header-premium">
        <div class="logo">
            <img src="logo.png" alt="CampusHome Logo" style="height: 40px; margin-right: 10px;">
            <span>CampusHome</span>
        </div>
        <nav style="display: flex; align-items: center; gap: 1rem;">
            <div class="theme-toggle" onclick="toggleTheme()"
                style="cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; color: var(--gray);">
                <ion-icon name="moon-outline" id="theme-icon"></ion-icon>
            </div>
            <a href="index.html" class="btn-action-sm btn-config" style="text-decoration:none;">
                <ion-icon name="arrow-back-outline"></ion-icon> Quitter
            </a>
        </nav>
    </header>

    <div class="container-premium fade-in">
        <h2 style="font-weight:800; font-size:2rem; margin-bottom:2.5rem; color: var(--dark);">Gestion des Étudiants
        </h2>
        <div id="students-list"></div>
        <p id="no-data"
            style="text-align:center; color: var(--gray); display:none; padding:3rem; border:2px dashed var(--gray); border-radius:30px; opacity: 0.5;">
            Aucun étudiant inscrit pour le moment.
        </p>
    </div>

    <!-- Script Backend -->
    <script src="api.js"></script>

    <!-- Script Page -->
    <script>
        // Utilitaire pour éviter les injections XSS
        function escapeHTML(str) {
            if (!str) return "";
            return str.toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        const currentUserEmail = localStorage.getItem('campus_current_email');
        const currentUser = localStorage.getItem('campus_current_role');

        if (!currentUser || (currentUser !== 'owner' && currentUser !== 'admin')) {
            alert("Accès refusé.");
            window.location.href = 'index.html';
        }

        async function init() {
            initTheme();
            let students = [];
            try {
                if (currentUser === 'admin') {
                    students = await api.getStudents();
                } else if (currentUser === 'owner' && currentUserEmail) {
                    students = await api.getStudentsByOwner(currentUserEmail);
                }

                if (students.length === 0) {
                    document.getElementById('no-data').style.display = 'block';
                    return;
                }

                const list = document.getElementById("students-list");
                const tableContainer = document.createElement('div');
                tableContainer.className = 'table-responsive';
                tableContainer.innerHTML = `
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; border-bottom: 2px solid #f1f5f9;">
                                <th style="padding: 1rem;">Étudiant</th>
                                <th style="padding: 1rem;">Logement</th>
                                <th style="padding: 1rem;">Paiement</th>
                                <th style="padding: 1rem;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="students-table-body"></tbody>
                    </table>
                `;
                list.appendChild(tableContainer);
                const tbody = document.getElementById('students-table-body');

                const allLogements = await api.getLogements();

                students.forEach(student => {
                    const displayName = student.name;
                    const profilePic = student.profilePic || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}`;
                    const log = allLogements.find(l => l.id == student.currentLogementId);
                    const logTitle = log ? log.titre : 'Non assigné';

                    const reste = student.resteAPayer || 0;
                    let statusBadge = reste <= 0 ? '<span class="status-badge" style="background:#10b981; color:white;">✅ Payé</span>' : `<span class="status-badge" style="background:#f43f5e; color:white;">Reste: ${reste.toLocaleString()} GNF</span>`;

                    const tr = document.createElement("tr");
                    tr.style.borderBottom = '1px solid #f1f5f9';
                    tr.innerHTML = `
                        <td style="padding: 1rem; display: flex; align-items: center; gap: 10px;">
                            <img src="${profilePic}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover;">
                            <div>
                                <div style="font-weight: 700;">${escapeHTML(displayName)}</div>
                                <div style="font-size: 0.75rem; color: var(--gray);">${escapeHTML(student.phone)}</div>
                            </div>
                        </td>
                        <td style="padding: 1rem;">${escapeHTML(logTitle)}</td>
                        <td style="padding: 1rem;">${statusBadge}</td>
                        <td style="padding: 1rem;">
                            <div style="display:flex; gap:0.5rem;">
                                <button onclick="definirLoyer('${student.email}')" class="btn-action-sm btn-config"><ion-icon name="settings-outline"></ion-icon></button>
                                <button onclick="ajoutPaiement('${student.email}')" class="btn-action-sm btn-pay"><ion-icon name="card-outline"></ion-icon></button>
                                <button onclick="supprimerEtudiant('${student.email}')" class="btn-action-sm btn-del"><ion-icon name="trash-outline"></ion-icon></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
            }
        }

        window.definirLoyer = async function (email) {
            const montant = prompt("Montant TOTAL du loyer ?");
            if (montant && !isNaN(montant)) {
                await api.setLoyer(email, montant);
                location.reload();
            }
        };

        window.ajoutPaiement = async function (email) {
            const montant = prompt("Montant versé ?");
            if (montant && !isNaN(montant)) {
                await api.addPayment({ studentEmail: email, montant: montant });
                location.reload();
            }
        };

        window.supprimerEtudiant = async function (email) {
            if (confirm("Retirer cet étudiant ?")) {
                await api.quitterLogement(email);
                location.reload();
            }
        };

        function initTheme() {
            const savedTheme = localStorage.getItem('campus_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.name = savedTheme === 'dark' ? 'sunny-outline' : 'moon-outline';
        }

        window.toggleTheme = function () {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('campus_theme', newTheme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.name = newTheme === 'dark' ? 'sunny-outline' : 'moon-outline';
        }

        init();
    </script>

</body>

</html>
